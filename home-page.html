<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHATIFY – Chat</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #020617;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .chat-header {
      background: #1e293b;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h2 {
      margin: 0;
      font-size: 20px;
    }

    .logout-btn {
      background: #ef4444;
      border: none;
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* Messages */
    .messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #020617;
    }

    .message {
      margin-bottom: 10px;
      max-width: 70%;
      padding: 10px;
      border-radius: 8px;
      background: #1e293b;
    }

    .my-message {
      background: #6366f1;
      margin-left: auto;
    }

    /* Input box */
    .input-box {
      display: flex;
      padding: 10px;
      background: #1e293b;
    }

    .input-box input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    .input-box button {
      margin-left: 10px;
      padding: 10px 16px;
      background: #6366f1;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="chat-header">
    <h2>CHATIFY – Global Chat</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages"></div>

  <!-- INPUT -->
  <div class="input-box">
    <input
      type="text"
      id="messageInput"
      placeholder="Type a message..."
    />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    // TEMP CHAT LOGIC (Firebase baad me)
    function sendMessage() {
      const input = document.getElementById("messageInput");
      if (!input.value.trim()) return;

      const div = document.createElement("div");
      div.classList.add("message", "my-message");
      div.innerText = input.value;

      document.getElementById("messages").appendChild(div);
      input.value = "";

      // auto scroll
      div.scrollIntoView({ behavior: "smooth" });
    }

    function logout() {
      // Baad me Firebase signOut()
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
