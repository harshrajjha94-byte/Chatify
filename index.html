<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHATIFY – Welcome</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #0f172a;
      color: #fff;
    }

    /* Landing Layout */
    .landing {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 60px;
      background:
        linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
        url("https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e")
        center / cover no-repeat;
    }

    .hero {
      max-width: 500px;
    }

    .hero h1 {
      font-size: 52px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.9;
    }

    /* Login Card */
    .card {
      background: #020617;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 20px 40px rgba(0,0,0,.4);
    }

    .card h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    .card button {
      width: 100%;
      padding: 10px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .card button.secondary {
      background: transparent;
      border: 1px solid #6366f1;
    }

    .card button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <!-- LANDING PAGE -->
  <section class="landing">
    <div class="hero">
      <h1>CHATIFY</h1>
      <p>Real-time conversations. Simple. Fast. Secure.</p>
    </div>

    <div class="card">
      <h2>Email Login</h2>

      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />

      <button onclick="login()">Login</button>
      <button class="secondary" onclick="signup()">Sign Up</button>
    </div>
  </section>

  <script>
    function login() {
      // Abhi direct redirect
      // Baad me yahan Firebase auth add karenge
      window.location.href = "home-page.html";
    }

    function signup() {
      alert("Signup feature coming soon (Firebase)");
    }
  </script>

</body>
</html>
